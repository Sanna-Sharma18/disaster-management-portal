services:
  # ── Oracle XE 21c ──────────────────────────────────────────
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: relief_atlas_db
    environment:
      ORACLE_PASSWORD: ${ORACLE_SYS_PASSWORD:-Oracle123!}
      APP_USER: ${ORACLE_USER:-disaster_user}
      APP_USER_PASSWORD: ${ORACLE_PASSWORD:-DisasterApp123!}
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./db/init:/container-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 30s
      retries: 20
      start_period: 5m
    restart: unless-stopped

  # ── Go REST API ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: relief_atlas_api
    environment:
      ORACLE_HOST: oracle
      ORACLE_PORT: 1521
      ORACLE_SERVICE: ${ORACLE_SERVICE:-XEPDB1}
      ORACLE_USER: ${ORACLE_USER:-disaster_user}
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-DisasterApp123!}
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      oracle:
        condition: service_healthy
    restart: unless-stopped

volumes:
  oracle_data:
